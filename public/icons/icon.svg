  <circle cx="200" cy="240" r="16" fill="#dc2626" opacity="0.6"/>
  <circle cx="312" cy="240" r="16" fill="#dc2626" opacity="0.6"/>
  <circle cx="256" cy="280" r="20" fill="#dc2626" opacity="0.7"/>
  
