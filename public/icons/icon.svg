  <rect x="100" y="300" width="312" height="40" fill="#1e293b" rx="4"/>
  <rect x="100" y="320" width="280" height="20" fill="#64748b" rx="2"/>
  <rect x="100" y="340" width="240" height="20" fill="#64748b" rx="2"/>
  
