<!DOCTYPE html>
<html>
  <head>
    <title>Generate PWA Icons</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      canvas {
        border: 1px solid #ccc;
        margin: 10px;
      }
      .icon-set {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <h1>PWA Icon Generator</h1>
    <p>Right-click each icon and save as PNG with the appropriate filename.</p>

    <div class="icon-set">
      <div>
        <h3>72x72</h3>
        <canvas id="icon72" width="72" height="72"></canvas>
      </div>
      <div>
        <h3>96x96</h3>
        <canvas id="icon96" width="96" height="96"></canvas>
      </div>
      <div>
        <h3>128x128</h3>
        <canvas id="icon128" width="128" height="128"></canvas>
      </div>
      <div>
        <h3>144x144</h3>
        <canvas id="icon144" width="144" height="144"></canvas>
      </div>
      <div>
        <h3>152x152</h3>
        <canvas id="icon152" width="152" height="152"></canvas>
      </div>
      <div>
        <h3>192x192</h3>
        <canvas id="icon192" width="192" height="192"></canvas>
      </div>
      <div>
        <h3>384x384</h3>
        <canvas id="icon384" width="384" height="384"></canvas>
      </div>
      <div>
        <h3>512x512</h3>
        <canvas id="icon512" width="512" height="512"></canvas>
      </div>
    </div>

    <script>
      function drawIcon(canvasId, size) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext("2d");

        // Clear canvas
        ctx.clearRect(0, 0, size, size);

        // Background gradient
        const bgGradient = ctx.createLinearGradient(0, 0, size, size);
        bgGradient.addColorStop(0, "#3b82f6");
        bgGradient.addColorStop(1, "#1d4ed8");

        // Draw background
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, size, size);

        // Card dimensions (scaled)
        const cardWidth = size * 0.75;
        const cardHeight = size * 0.5;
        const cardX = (size - cardWidth) / 2;
        const cardY = size * 0.25;

        // Draw card
        ctx.fillStyle = "#f8fafc";
        ctx.fillRect(cardX, cardY, cardWidth, cardHeight);

        // Card border
        ctx.strokeStyle = "#1e293b";
        ctx.lineWidth = size * 0.008;
        ctx.strokeRect(cardX, cardY, cardWidth, cardHeight);

        // Inner border
        const innerPadding = size * 0.03;
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth = size * 0.004;
        ctx.strokeRect(
          cardX + innerPadding,
          cardY + innerPadding,
          cardWidth - innerPadding * 2,
          cardHeight - innerPadding * 2
        );

        // Japanese-style circles
        const centerX = size / 2;
        const centerY = cardY + cardHeight * 0.4;
        const radius = size * 0.06;

        ctx.fillStyle = "#dc2626";
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
        ctx.fill();

        // Smaller circles
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(
          centerX - size * 0.1,
          centerY + size * 0.08,
          radius * 0.7,
          0,
          2 * Math.PI
        );
        ctx.fill();

        ctx.beginPath();
        ctx.arc(
          centerX + size * 0.1,
          centerY + size * 0.08,
          radius * 0.7,
          0,
          2 * Math.PI
        );
        ctx.fill();

        ctx.globalAlpha = 1;
      }

      // Generate all icons
      drawIcon("icon72", 72);
      drawIcon("icon96", 96);
      drawIcon("icon128", 128);
      drawIcon("icon144", 144);
      drawIcon("icon152", 152);
      drawIcon("icon192", 192);
      drawIcon("icon384", 384);
      drawIcon("icon512", 512);
    </script>
  </body>
</html>
